<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex2API Ops Console Banner</title>
  <desc id="desc">A terminal operations console banner for Codex2API</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10131A"/>
      <stop offset="0.55" stop-color="#151A22"/>
      <stop offset="1" stop-color="#0D1320"/>
    </linearGradient>
    <linearGradient id="panel" x1="144" y1="78" x2="1256" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="298" y1="164" x2="1088" y2="254" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="0.46" stop-color="#34D399"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#34D399" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1400" height="420" rx="28" fill="url(#bg)"/>
  <rect x="132" y="70" width="1136" height="284" rx="22" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  <rect x="132" y="70" width="1136" height="50" rx="22" fill="#0F172A"/>
  <path d="M132 120H1268" stroke="#334155" stroke-width="2"/>
  <circle cx="172" cy="96" r="8" fill="#F87171"/>
  <circle cx="200" cy="96" r="8" fill="#FBBF24"/>
  <circle cx="228" cy="96" r="8" fill="#34D399"/>
  <text x="704" y="101" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#94A3B8">codex2api gateway monitor</text>
  <text x="180" y="162" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#38BDF8">$ curl /v1/responses</text>
  <text x="180" y="194" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#A7F3D0">account_pool: healthy</text>
  <text x="180" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#FDE68A">scheduler: dynamic concurrency</text>
  <text x="180" y="258" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#F0ABFC">admin: /admin/</text>
  <rect x="824" y="143" width="346" height="142" rx="18" fill="#020617" stroke="#334155"/>
  <path d="M864 244L926 200L981 222L1045 172L1130 230" stroke="#34D399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1045" cy="172" r="7" fill="#FDE68A"/>
  <text x="700" y="244" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="112" font-weight="900" letter-spacing="0" fill="url(#textGrad)" filter="url(#soft)">Codex2API</text>
  <text x="700" y="320" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="800" letter-spacing="3" fill="#CBD5E1">ACCOUNT POOL OPS FOR CODEX</text>
