      <stop offset="0" stop-color="#070B16"/>
      <stop offset="0.46" stop-color="#101827"/>
      <stop offset="1" stop-color="#1C102A"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="268" y1="146" x2="1140" y2="272" gradientUnits="userSpaceOnUse">
