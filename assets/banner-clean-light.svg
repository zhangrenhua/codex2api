<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex2API Clean Light Banner</title>
  <desc id="desc">A clean light editorial banner for Codex2API</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.48" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="230" y1="298" x2="1170" y2="298" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.52" stop-color="#059669"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1400" height="420" rx="28" fill="url(#bg)"/>
  <rect x="92" y="74" width="1216" height="272" rx="34" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <rect x="132" y="114" width="174" height="42" rx="21" fill="#DBEAFE"/>
  <text x="219" y="141" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="800" letter-spacing="2" fill="#1D4ED8">OPENAI API</text>
  <rect x="1094" y="264" width="174" height="42" rx="21" fill="#DCFCE7"/>
  <text x="1181" y="291" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="800" letter-spacing="2" fill="#047857">ADMIN OPS</text>
  <text x="700" y="230" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="124" font-weight="900" letter-spacing="0" fill="#0F172A">Codex2API</text>
  <text x="700" y="284" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="800" letter-spacing="3" fill="#475569">CODEX GATEWAY WITH A BUILT-IN CONTROL PLANE</text>
  <path d="M230 310H1170" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <g opacity="0.9">
    <circle cx="376" cy="310" r="8" fill="#2563EB"/>
    <circle cx="700" cy="310" r="8" fill="#059669"/>
    <circle cx="1024" cy="310" r="8" fill="#E11D48"/>
  </g>
