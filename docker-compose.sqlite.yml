name: codex2api-sqlite

services:
  codex2api:
    image: ghcr.io/james-6-23/codex2api:latest
    container_name: codex2api-sqlite
    ports:
      - "${BIND_HOST:-0.0.0.0}:${CODEX_PORT:-8080}:${CODEX_PORT:-8080}"
    env_file:
      - .env
    volumes:
      - sqlite-data:/data
      - ./logs:/app/logs
      # 可选：启用管理后台一键更新。Docker socket 权限较高，只在可信环境中打开。
      # - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  sqlite-data:
    name: codex2api-sqlite_sqlite-data
